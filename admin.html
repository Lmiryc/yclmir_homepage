<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Moderation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="framer-bg-container" aria-hidden="true"></div>

    <section class="admin-page">
        <div class="container">
            <div class="admin-panel">
                <h1>Admin Moderation</h1>
                <p>API: https://yclmir.pythonanywhere.com/api/v1/</p>
                <p><a class="btn-link" href="index.html">Back to Homepage &rarr;</a></p>

                <form id="loginForm" class="admin-form">
                    <div class="admin-row">
                        <label for="username">
                            Admin Username
                            <input id="username" required>
                        </label>
                        <label for="logname">
                            Admin Logname
                            <input id="logname" type="password" required>
                        </label>
                    </div>
                    <button type="submit" class="admin-btn">Admin Login</button>
                </form>

                <div class="admin-toolbar">
                    <button id="checkSessionBtn" type="button" class="admin-action-btn">Check Session</button>
                    <button id="refreshPendingBtn" type="button" class="admin-action-btn">Refresh Pending</button>
                    <button id="logoutBtn" type="button" class="admin-action-btn">Logout</button>
                </div>

                <div id="whoami"></div>
                <div id="status" class="admin-status"></div>

                <h2>Pending Comments</h2>
                <ul id="pendingList" class="admin-list"></ul>
            </div>
        </div>
    </section>

    <div class="custom-cursor" id="cursor"></div>

    <script>
    const cursor = document.getElementById('cursor');

    document.addEventListener('mousemove', (e) => {
        cursor.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0) translate(-50%, -50%)`;
    });

    const interactiveSelector = 'a, button';
    const textSelector = 'p, h1, h2, h3, h4, h5, h6, span, li, label, input, textarea';

    document.addEventListener('mouseover', (e) => {
        const interactiveTarget = e.target.closest(interactiveSelector);
        if (interactiveTarget) {
            cursor.classList.remove('framer-text');
            cursor.classList.add('framer-active');
            return;
        }

        const textTarget = e.target.closest(textSelector);
        if (textTarget) {
            cursor.classList.remove('framer-active');
            cursor.classList.add('framer-text');
            return;
        }

        cursor.classList.remove('framer-active', 'framer-text');
    });

    document.addEventListener('mouseleave', () => {
        cursor.classList.remove('framer-active', 'framer-text');
    });
    </script>

    <script src="admin.js"></script>
</body>
</html>
