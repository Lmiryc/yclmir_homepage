<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Local Comments Client</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 760px;
        margin: 2rem auto;
        padding: 0 1rem;
      }

      form {
        display: grid;
        gap: 0.75rem;
        margin-bottom: 1rem;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
      }

      input,
      textarea,
      button {
        font: inherit;
        padding: 0.55rem;
      }

      textarea {
        min-height: 88px;
        resize: vertical;
      }

      .status {
        min-height: 1.2rem;
        margin: 0.5rem 0 1rem;
      }

      li {
        border: 1px solid #ddd;
        border-radius: 8px;
        margin-bottom: 0.75rem;
        padding: 0.75rem;
      }

      .nav-button {
        display: inline-block;
        padding: 0.55rem 0.85rem;
        border: 1px solid #888;
        border-radius: 6px;
        text-decoration: none;
        color: #222;
      }
    </style>
  </head>
  <body>
    <h1>Comments Client</h1>
    <p>Endpoint: https://yclmir.pythonanywhere.com/api/v1/comments/</p>
    <p><a class="nav-button" href="./admin.html">Admin login</a></p>

    <form id="commentForm">
      <label>
        Username
        <input id="username" required />
      </label>
      <label>
        Comment
        <textarea id="comment" required></textarea>
      </label>
      <button type="submit">Submit</button>
    </form>

    <div id="status" class="status"></div>
    <ul id="commentList"></ul>

    <script src="./comments.js"></script>
  </body>
</html>
