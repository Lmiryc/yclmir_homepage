<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Moderation</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 860px;
        margin: 2rem auto;
        padding: 0 1rem;
      }

      form {
        display: grid;
        gap: 0.75rem;
        margin-bottom: 1rem;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
      }

      input,
      button {
        font: inherit;
        padding: 0.55rem;
      }

      .toolbar {
        display: flex;
        gap: 0.5rem;
        margin: 0.75rem 0;
      }

      .status {
        min-height: 1.2rem;
        margin: 0.5rem 0 1rem;
      }

      ul {
        list-style: none;
        padding: 0;
      }

      li {
        border: 1px solid #ddd;
        border-radius: 8px;
        margin-bottom: 0.75rem;
        padding: 0.75rem;
      }

      .actions {
        display: flex;
        gap: 0.5rem;
        margin-top: 0.5rem;
      }

      .nav-button {
        display: inline-block;
        padding: 0.55rem 0.85rem;
        border: 1px solid #888;
        border-radius: 6px;
        text-decoration: none;
        color: #222;
      }
    </style>
  </head>
  <body>
    <h1>Admin Moderation</h1>
    <p>API: https://yclmir.pythonanywhere.com/api/v1/</p>
    <p><a class="nav-button" href="./index.html">Back to index</a></p>

    <form id="loginForm">
      <div class="row">
        <label>
          Admin Username
          <input id="username" required />
        </label>
        <label>
          Admin Logname
          <input id="logname" type="password" required />
        </label>
      </div>
      <button type="submit">Admin Login</button>
    </form>

    <div class="toolbar">
      <button id="checkSessionBtn" type="button">Check Session</button>
      <button id="refreshPendingBtn" type="button">Refresh Pending</button>
      <button id="logoutBtn" type="button">Logout</button>
    </div>

    <div id="whoami"></div>
    <div id="status" class="status"></div>

    <h2>Pending Comments</h2>
    <ul id="pendingList"></ul>

    <script src="./admin.js"></script>
  </body>
</html>
